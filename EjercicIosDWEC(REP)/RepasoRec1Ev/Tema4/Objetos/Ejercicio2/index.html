           class  Coordenadas{
            constructor(x,y){
                this.x=x;
                this.y=y;
            }

            copia(){
                return `${this.x} ${this.y}`
            }

            suma(){
                return this.x+this.y;
            }

            toString(){
                return `{${this.x},${this.y}}`
            }

            iguales(c1){
                if(this.x===c1.x&&this.y===c1.y){
                    return`Son iguales`
                }
                return `Los puntos son diferentes {${this.x},${this.y}}-{${c1.x},${c1.y}}` 
            }

            cambiar(x,y){
                this.x=x
                this.y=y
            }
           }
