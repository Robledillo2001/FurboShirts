<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            function Productos(precio,cantidad){
                this.precio=precio
                this.cantidad=cantidad
            }

            Productos.prototype.getPrecio=function(){
                return this.precio
            }

            Productos.prototype.getCantidad=function(){
                return this.cantidad
            }

            function Supermercado(nProductos){
                this.productos=[];

                for(let i=0;i<nProductos;i++){
                    let precio=Math.floor(Math.random()*40)+1
                    let cantidad=Math.floor(Math.random()*70)+1
                    this.productos.push(new Productos(precio,cantidad))
                }
            }

            Supermercado.prototype.getPrecioFinal = function() {
                let precioFinal = 0;

                for (let i = 0; i < this.productos.length; i++) {  // 🔹 Usar `.length`
                    let precioUnitario = this.productos[i].getPrecio();
                    let cantidad = this.productos[i].getCantidad();
                    precioFinal += precioUnitario * cantidad;  // 🔹 Multiplicar antes de sumar
                }

                return precioFinal;
            }
            let supermercado=new Supermercado(15);
            console.log(supermercado.getPrecioFinal())
        </script>
    </body>
</html>
