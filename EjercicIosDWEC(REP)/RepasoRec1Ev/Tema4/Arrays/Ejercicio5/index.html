<html>

        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
           let array=[]

           for(let i=0;i<10;i++){
                array[i]=[];
                for(let j=0;j<10;j++){
                    array[i][j]=Math.floor(Math.random()*9)+1
                }
           }
           for(let i=0;i<array.length;i++){
            let sumaFilas=0;
                for(let j=0;j<array[i].length;j++){
                    sumaFilas+=array[i][j]
                }
                array[i].push(sumaFilas)
           }
           
           for(let i=0;i<array.length;i++){
                console.log(array[i].join("\t"))
           }
        </script>
    </body>
</html>
