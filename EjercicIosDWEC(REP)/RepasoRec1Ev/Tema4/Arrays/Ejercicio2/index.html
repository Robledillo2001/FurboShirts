<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            let cadena;

            let personas=[]
            let longs=[];

            while(cadena!=="fin"){
                cadena=prompt("Escriba nombres hasta escribir fin")
                if(cadena==="fin"){
                    console.log("Agregar Personas Termiando");
                    break;
                }

                personas.push(cadena);
                longs.push(cadena.length);
            }

            for(let i=0;i<personas.length;i++){
                console.log(`Nombre: ${personas[i]}\t\n Longitud: ${longs[i]}`)
            }
        </script>
    </body>
</html>
