<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            let tablaMultiplicar = [];

            for (let i = 0; i <= 9; i++) { // i representa la fila (número base de la tabla)
                tablaMultiplicar[i] = []; // Inicializa la fila
                for (let j = 1; j <= 9; j++) { // j representa la columna (números multiplicadores)
                    tablaMultiplicar[i][j] = i * j; // Calcula el valor de la celda
                }
            }

            // Mostrar la tabla de multiplicar
            for (let i = 1; i <= 9; i++) {
                console.log(tablaMultiplicar[i].join("\t")); // Imprime cada fila con tabulaciones
            }

        </script>
    </body>
</html>
