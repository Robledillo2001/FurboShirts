<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            let cadena;

            let personas=[]

            while(cadena!=="fin"){
                cadena=prompt("Escriba nombres hasta escribir fin")
                if(cadena==="fin"){
                    console.log("Agregar Personas Termiando");
                    break;
                }

                personas.push([cadena,cadena.length]);
            }

            for (let i = 0; i < personas.length; i++) {
                console.log(`Nombre: ${personas[i][0]}\t Longitud: ${personas[i][1]}`);
            }
        </script>
    </body>
</html>
