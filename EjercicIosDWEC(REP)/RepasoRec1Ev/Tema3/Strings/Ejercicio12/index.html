<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            let cadena=prompt("Escriba una cadena")

            let CadenasinEspacios=cadena.split(" ");
            let contador=0;
            for(let i=0;i<CadenasinEspacios.length;i++){
                contador++
            }

            console.log(`En la cadena "${cadena}" hay ${contador} frases`);
        </script>
    </body>
</html>
