<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            // Pedir la cadena
            let texto = prompt("Escribe una cadena:");

            // Guardar la fecha inicial
            let fecha = new Date();

            // Iniciar el intervalo para actualizar el tiempo y mover la cadena
            let intervalo = setInterval(() => {
                // Obtener la fecha actual
                let fechaIntervalo = new Date();

                // Calcular la diferencia en milisegundos
                let tiempoTranscurrido = fechaIntervalo - fecha;

                // Convertir los milisegundos a minutos y segundos
                let minutos = Math.floor(tiempoTranscurrido / 60000); // 60000 ms = 1 min
                let segundos = Math.floor((tiempoTranscurrido % 60000) / 1000); // Resto de los segundos

                // Mostrar el tiempo transcurrido en minutos y segundos
                console.log(`Tiempo transcurrido: ${minutos} minutos y ${segundos} segundos`);

                // Mover la primera letra al final de la cadena
                let cadenaMov = texto.slice(1) + texto[0];

                // Mostrar la cadena modificada
                console.log(`Cadena en movimiento: ${cadenaMov}`);

                // Actualizar el texto con el movimiento
                texto = cadenaMov;

                if(segundos===20){
                    clearInterval(intervalo);
                }

            }, 1000); // Ejecutar cada 1000 ms (1 segundo)
        </script>
    </body>
</html>
