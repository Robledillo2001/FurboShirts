<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            function esCapicua(texto) {
                // Quitamos espacios, convertimos todo a minúsculas y eliminamos caracteres no alfanuméricos
                let textoLimpio = texto.toLowerCase().replace(/[^a-z0-9]/g, "");
                // Invertimos el texto
                let textoInvertido = textoLimpio.split("").reverse().join("");
                // Comparamos el texto limpio con su versión invertida
                return textoLimpio === textoInvertido;
            }

            // Ejemplo de uso
            let texto = prompt("Escribe un texto para comprobar si es capicúa:");
            if (esCapicua(texto)) {
                console.log("El texto es capicúa");
            } else {
                console.log("El texto NO es capicúa");
            }

        </script>
    </body>
</html>
