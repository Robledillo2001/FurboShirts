<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            let texto = prompt("Escribe una cadena");

            // Dividir el texto a la mitad
            let mitad = Math.floor(texto.length / 2);

            let parte1 = texto.slice(0, mitad);   // Primera parte
            let parte2 = texto.slice(mitad);      // Segunda parte

            console.log(parte1);
            console.log(parte2);
        </script>
    </body>
</html>
