<html>
    <head>
        <title>Ejercicio1</title>
    </head>
    <body>
        <script>
            let texto = prompt("Escribe una cadena");
            
            let subcadena=prompt("Escriba una subcadena");

            if(texto.startsWith(subcadena)){
                console.log("La cadena comienza con la subcadena "+subcadena)
            }else{
                console.log("La cadena no comienza con la subcadena "+subcadena)
            }
        </script>
    </body>
</html>
