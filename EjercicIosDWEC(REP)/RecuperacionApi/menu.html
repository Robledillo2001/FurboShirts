<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú Principal - REE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body, html {
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .menu-box {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,198,255,0.5);
    }

    .menu-box h1 {
      color: #00c6ff;
      margin-bottom: 30px;
    }

    .menu-box a.btn {
      margin: 10px;
      font-size: 1.2rem;
      padding: 10px 30px;
    }

    .btn-menu {
      background: linear-gradient(to right, #0072ff, #00c6ff);
      border: none;
      transition: all 0.3s ease;
    }

    .btn-menu:hover {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="menu-box">
    <h1>🌐 Visualizador REE</h1>
    <a href="demanda.html" class="btn btn-menu text-white">🔌 Demanda Eléctrica</a>
    <a href="balance.html" class="btn btn-menu text-white">⚡ Balance Eléctrico</a>
    <a class="btn btn-menu text-white" href="generacion.html">💻 Generación por Tecnologia</a>
    <a class="btn btn-menu text-white" href="intercambio.html">🔄 Intercambio por Frontera</a>
  </div>

</body>
</html>
