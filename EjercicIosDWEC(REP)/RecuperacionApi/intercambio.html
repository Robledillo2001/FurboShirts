<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <!-- Definición del charset para el documento -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive para móviles -->
    <title>Intercambio por Frontera</title> <!-- Título de la pestaña -->
    <!-- Bootstrap CSS para estilos predefinidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css"> <!-- Estilos personalizados -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Librería Chart.js para gráficos -->
</head>
<body>
    <!-- Barra de navegación con enlaces -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="menu.html">🌐 Visualizador REE</a> <!-- Marca/nombre de la web -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido" aria-controls="navbarContenido" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span> <!-- Icono menú hamburguesa para móviles -->
            </button>
            <div class="collapse navbar-collapse" id="navbarContenido">
                <ul class="navbar-nav ms-auto"> <!-- Menú con enlaces -->
                    <li class="nav-item"><a class="nav-link" href="menu.html">🏠 Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="demanda.html">🔌 Demanda Eléctrica</a></li>
                    <li class="nav-item"><a class="nav-link" href="balance.html">⚡ Balance Eléctrico</a></li>
                    <li class="nav-item"><a class="nav-link" href="generacion.html">💻 Generación por Tecnología</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Área donde se mostrarán los resultados -->
    <div id="resultado" class="row">
        <div class="col-12 text-center py-5">
            <!-- Spinner de carga oculto inicialmente -->
            <div class="spinner-border text-primary" role="status" id="spinner" style="display: none;">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <!-- Mensaje inicial que se muestra mientras no hay datos -->
            <p id="mensaje-inicial">Buscando Intercambio por fronteras</p>
        </div>
    </div>

    <!-- Pie de página con créditos y fecha de actualización -->
    <div class="footer text-center">
        <div class="container">
            <p>Datos proporcionados por Red Eléctrica de España (REE) | Visualización desarrollada con JavaScript</p>
            <p>Última actualización: <span id="last-update"></span></p> <!-- Aquí se pondrá la fecha -->
        </div>
    </div>

    <!-- Script principal -->
    <script>
        // Obtener referencias a elementos DOM que usaremos
        const resultado = document.getElementById('resultado');
        const spinner = document.getElementById('spinner');
        const mensajeInicial = document.getElementById('mensaje-inicial');
        const lastUpdateElement = document.getElementById('last-update');

        // Función asíncrona para obtener datos de intercambio desde la API
        async function obtenerIntercambio() {
            resultado.innerHTML = ''; // Limpiar área de resultados
            spinner.style.display = 'inline-block'; // Mostrar spinner
            mensajeInicial.style.display = 'none'; // Ocultar mensaje inicial

            // URL de la API con fechas específicas y parámetros
            const url = `https://apidatos.ree.es/es/datos/intercambios/todas-fronteras-fisicos?start_date=2024-01-01&end_date=2025-06-01&time_trunc=year`;

            try {
                // Solicitud a la API con fetch y cabeceras necesarias
                const respuesta = await fetch(url, {
                    headers: {
                        "Accept": "application/json",
                        "User-Agent": "Mozilla/5.0"
                    }
                });

                // Si la respuesta no es correcta, lanza error
                if (!respuesta.ok) {
                    throw new Error(`Error ${respuesta.status}: ${respuesta.statusText}`);
                }

                // Parsear la respuesta JSON
                const intercambio = await respuesta.json();

                // Obtener y mostrar la fecha de última actualización
                const lastUpdate = new Date(intercambio.data.attributes['last-update']);
                lastUpdateElement.textContent = lastUpdate.toLocaleString();

                // Llamar función para mostrar los datos en pantalla
                mostrarDatos(intercambio);
            } catch (error) {
                // Mostrar mensaje de error en la UI
                resultado.innerHTML = `
                    <div class="col-8">
                        <div class="alert alert-danger">
                            <strong>Error:</strong> ${error.message}
                        </div>
                    </div>
                `;
            } finally {
                spinner.style.display = 'none'; // Ocultar spinner independientemente del resultado
            }
        }

        // Función para procesar y mostrar los datos recibidos
        function mostrarDatos(intercambio) {
            // Filtra y mapea los datos para obtener título y valor específico para el 1 de enero de 2025
            const datos = intercambio.included
                .map(pais => {
                    // Buscar dentro de cada país el objeto 'saldo'
                    const saldo = pais.attributes?.content?.find(c => c.type === "saldo");
                    if (!saldo || !saldo.attributes?.values?.length) return null; // Si no hay saldo válido, descarta

                    // Buscar valor de la fecha específica "2025-01-01"
                    return {
                        title: pais.attributes.title,
                        value: saldo.attributes.values.find(v => v.datetime.startsWith("2025-01-01"))?.value || 0
                    };
                })
                .filter(Boolean); // Eliminar valores nulos

            // Extraer etiquetas (nombres) y valores para la tabla y gráfico
            const etiquetas = datos.map(t => t.title.charAt(0).toUpperCase() + t.title.slice(1));
            const valores = datos.map(t => t.value);
            const total = valores.reduce((acc, val) => acc + val, 0); // Sumar total de valores

            // Construir tabla HTML con los datos y porcentaje de cada país
            resultado.innerHTML = `
                <div class="col-12 mt-3">
                    <table class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>País</th>
                                <th>Intercambio (MW)</th>
                                <th>Porcentaje</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${datos.map(t => {
                                const porcentaje = total ? ((t.value / total)).toFixed(2) : 'N/A';//Sacar el porcentaje por pais
                                // Capitalizar primera letra del país
                                return `
                                    <tr>
                                        <td>${t.title.charAt(0).toUpperCase() + t.title.slice(1)}</td>
                                        <td>${t.value.toLocaleString()} MW</td>
                                        <td>${porcentaje}%</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                    <!-- Canvas donde se renderizará el gráfico circular -->
                    <canvas id="graficoTecnologias" class="my-2"></canvas>
                </div>
            `;

            // Obtener contexto del canvas para Chart.js
            const ctx = document.getElementById('graficoTecnologias').getContext('2d');

            // Crear gráfico tipo 'pie' con Chart.js usando las etiquetas y valores
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        data: valores,
                        backgroundColor: [
                            '#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#4bc0c0',
                            '#9966ff', '#ff9f40', '#c9cbcf', '#84ff99', '#f78fb3'
                        ]
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            labels: { color: '#fff' } // Color de las etiquetas en leyenda
                        }
                    }
                }
            });
        }

        // Ejecutar la función para obtener los datos al cargar la página
        obtenerIntercambio();
    </script>
</body>
</html>
