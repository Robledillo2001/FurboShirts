<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="parrafo1">Parrafo uno</p>
    <p id="parrafo2">Parrafo dos</p>
    <p id="parrafo3">Parrafo tres</p>
    <script>
        function escribirContenido(evento) {
            console.log(evento.target.textContent);
        }
        
        for (let i = 1; i <= 3; i++) {
            var p = document.getElementById("parrafo" + i);
            p.addEventListener("click", escribirContenido);
        }
    </script>
</body>
</html>
