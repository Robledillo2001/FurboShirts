<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordenadas del Evento</title>
    <style>
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background-color: #ff0766;
            border: 1px solid #ccc;
            padding: 10px;
            font-family: monospace;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="info">
    Mueve el ratón para ver las coordenadas...
</div>

<script>
    const info = document.getElementById("info");

    document.addEventListener("mousemove", function(event) {
        info.innerHTML = `
        <strong>Coordenadas relativas al navegador:</strong><br>
        clientX: ${event.clientX}px<br>
        clientY: ${event.clientY}px<br>
        <strong>Coordenadas relativas a la pantalla:</strong><br>
        screenX: ${event.screenX}px<br>
        screenY: ${event.screenY}px
        `;
    });
</script>

</body>
</html>
