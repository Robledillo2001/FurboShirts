<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo Promesas</title>
</head>
<body>
  <script>
    const tarea = new Promise((resolve, reject) => {
    let todoBien = true;

    if (todoBien) {
      resolve("Tarea completada");
    } else {
      reject("Algo salió mal");
    }
  });

  tarea
    .then(respuesta => {
      console.log("Éxito:", respuesta);
    })
    .catch(error => {
      console.error("Error:", error);
    });
  </script>
</body>
</html>
