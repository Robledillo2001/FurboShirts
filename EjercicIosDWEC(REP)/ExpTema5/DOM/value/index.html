<!DOCTYPE html>
<html>
<head>
    <title>Ejemplo DOM - aprenderaprogramar</title>
    <meta charset="utf-8">
</head>
<body>
    <form action="" id="form">
        <input type="text" id="input">
    </form>
    <script>
        document.getElementById("form").addEventListener("submit",(ev)=>{
            ev.preventDefault();
            console.log(document.getElementById("input").value);
        });
        
    </script>
</body>
</html>
