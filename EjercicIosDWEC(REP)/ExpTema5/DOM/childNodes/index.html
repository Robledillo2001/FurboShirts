<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo classList</title>
</head>
<body>
  <h1>Ejemplo</h1>
  <section id="s1">
  <h1 id="titulo">¿Quién soy?</h1>
  <p id="parrafo1">
    Hola, soy <strong>profesor de informática</strong> y soy de Cuenca.
  </p>
  <p id="parrafo2">Me gusta el cine</p>
  <p id="parrafo3">También me gustan las series</p>
  </section>

  <script>
    let parrafo1=document.getElementById("parrafo1");

    for(let hijo of parrafo1.childNodes){
      console.log(`Texto: ${hijo.nodeValue} - Tipo de nodo: ${hijo.nodeType}, Nombre de nodo: ${hijo.nodeName}`);
    }
  </script>

</body>
</html>
