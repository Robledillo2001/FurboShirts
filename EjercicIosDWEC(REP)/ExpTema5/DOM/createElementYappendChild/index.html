<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo NODOS</title>
</head>
<body>
  <script>
    //Crear un elemento
    let ul=document.createElement("ul");//Creamos un elemento lista
    //Añadir nodos
    for(let i=0;i<5;i++){//Se crearan 5 elementos en el ul
      let texto=`Elemento ${i+1}`;
      let li=document.createElement("li");//Creamos un elemento li dentro de la lista
      li.textContent=texto;//POnemos el valor del texto segun el elemento que se haya creado

      ul.appendChild(li)//Se añade el li en la lista desordenada
    }
    document.body.appendChild(ul)//Agregamos la lista completa al cuerpo del documento
    
    //POner nodo por delante de otro
    
    let lianterior=document.createElement("li");//Crear elemento nuevo

    lianterior.textContent="Elemento colota"//POner texto elemento

    ul.appendChild(lianterior)//POner en la lista

    ul.insertBefore(ul.childNodes[1],ul.childNodes[4]);//Colocarlo por encima del elemento de la posicion 2 de la lista
    
    let remplazo=document.createElement("li");//Crear li
    
    //Remplazar nodo
    
    remplazo.textContent="Elemento 6";

    ul.replaceChild(remplazo,ul.childNodes[2]);//Remplazar el nodo 2
    
    
    //Eliminar nodo
    ul.removeChild(ul.childNodes[4])
    ul.appendChild(ul.childNodes[4])
  </script>
</body>
</html>
