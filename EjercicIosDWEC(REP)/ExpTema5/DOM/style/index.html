<!DOCTYPE html>
<html>
<head>
    <title>Ejemplo DOM - aprenderaprogramar</title>
    <meta charset="utf-8">
    <style type="text/css">
        body {
            background-color: yellow;
            font-family: sans-serif;
        }
        label {
            color: maroon;
            display: block;
            padding: 5px;
        }
    </style>
</head>
<body>
    <main id="principal">
        <p>Uno</p>
        <p>Dos</p>
        <p>Tres</p>
    </main>
    <p>Cuatro</p>
    <p>Cinco</p>
    <script>
        let principal=document.getElementById("principal");
        let parrafo=principal.getElementsByTagName("p")[0];
        
        parrafo.addEventListener("click",(ev)=>{
            parrafo.style.color="red";
            parrafo.style.border="1px solid black";
        })
    </script>
</body>
</html>
