<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AJAX con textContent e innerHTML</title>
</head>
<body>

  <h2>Resultado con textContent</h2>
  <div id="contenido1"></div>

  <h2>Resultado con innerHTML</h2>
  <div id="contenido2"></div>

  <button onclick="cargarContenido()">Cargar con AJAX</button>

  <script>
    function cargarContenido() {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", "datos.html", true); // Simula una solicitud a un archivo externo
      xhr.onload = function () {
        if (xhr.status === 200) {
          document.getElementById("contenido1").textContent = xhr.responseText;
          document.getElementById("contenido2").innerHTML = xhr.responseText;
        }
      };
      xhr.send();
    }
  </script>

</body>
</html>
