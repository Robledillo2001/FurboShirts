<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIF Aleatorio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2em;
      background-color: #f0f0f0;
    }
    #nif {
      font-size: 1.5em;
      color: #333;
      margin-top: 1em;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>

  <h1>NIF Aleatorio</h1>
  <p id="nif">Cargando...</p>

  <script>
    const capaNIF = document.getElementById("nif");

    async function peticion() {
      try {
        const resp = await fetch("https://jorgesanchez.net/servicios/nifaleatorio.php");

        if (!resp.ok) {
          throw new Error(`Error ${resp.status}: ${resp.statusText}`);
        }

        const datos = await resp.json();
        capaNIF.textContent = datos[0]["numero"];
        capaNIF.classList.remove("error");

      } catch (error) {
        capaNIF.textContent = "Error al obtener el NIF: " + error.message;
        capaNIF.classList.add("error");
        console.error(error);
      }
    }

    peticion();
  </script>

</body>
</html>
