<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagen Aleatoria</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 2em;
    }
    img {
      max-width: 90%;
      height: auto;
      border: 2px solid #ccc;
      border-radius: 10px;
      margin-top: 1em;
    }
  </style>
</head>
<body>

  <main>
    <p>Esperando imagen...</p>
  </main>

  <script>
    const main = document.querySelector("main");

    async function peticion() {
      try {
        const img = document.createElement("img");
        img.src = "https://source.unsplash.com/random?" + new Date().getTime(); // Evita caché
        img.alt = "Imagen aleatoria de Unsplash";

        // Limpiar contenido y mostrar la imagen cuando cargue
        img.onload = () => {
          main.innerHTML = "";
          main.appendChild(img);
        };

        img.onerror = () => {
          throw new Error("No se pudo cargar la imagen.");
        };

      } catch (error) {
        main.textContent = "Error: " + error.message;
        console.error(error);
      }
    }

    peticion();
  </script>

</body>
</html>
