<html>
<head>
    <title>Ejercicio 6</title>
</head>
<body>
    <script>
        let lista=document.createElement("ul");
        document.body.appendChild(lista);

        for(let i=0;i<3;i++){
            let li=document.createElement("li");
            
            let contenido=`<p>Elemento ${i+1}</p>`;

            li.innerHTML=contenido;

            lista.appendChild(li);
        }

        let media=Math.floor(lista.childNodes.length/2);
        console.log(lista.childNodes[media].previousSibling);
        console.log(lista.childNodes[media].nextSibling);
    </script>
</body>
</html>
