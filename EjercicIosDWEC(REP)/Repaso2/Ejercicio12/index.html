<form id="correoForm">
  <button id="btn1" type="button">Botón 1</button>
  <button id="btn2" type="button">Botón 2</button>
  <button id="btn3" type="button">Botón 3</button>
</form>
<div id="resultado"></div>

<script>
  const resultado = document.getElementById("resultado");

  const botones = [
    { id: "btn1", nombre: "Boton 1" },
    { id: "btn2", nombre: "Boton 2" }
  ];

  botones.forEach(boton => {
    const el = document.getElementById(boton.id);
    el.addEventListener("focus", () => {
      resultado.innerHTML += `<p>Foco en ${boton.nombre}</p>`;
    });
    el.addEventListener("blur", () => {
      resultado.innerHTML = "";
      alert(`Se perdió el foco en ${boton.nombre}`);
    });
  });
</script>
