<html>
<head>
    <title>Ejercicio 2</title>
</head>
<body>
    <a href="http://localhost/EjerciciosDWEC(REP)/Repaso2/Ejercicio1/?" id="enlace1">Enlace 1</a>
    <a href="http://localhost/EjerciciosDWEC(REP)/Repaso2/Ejercicio1/?" id="enlace2">Enlace 2</a>
    <script>
        document.addEventListener("DOMContentLoaded",()=>{
            const enlace1=document.getElementById("enlace1");
            const enlace2=document.getElementById("enlace2");

            setTimeout(()=>{
                if(enlace1){
                    enlace1.remove();
                    console.log("Enlace1 eliminado");
                }
                setTimeout(()=>{
                    if(enlace2){
                        enlace2.remove();
                        console.log("Enlace2 eliminado")
                    }
                },5000);
            },5000);
        });
    </script>
