<html>
<head>
    <title>Ejercicio 6</title>
</head>
<body>
    <a class="enlace">Enlace 1</a>
    <a>Enlace 2</a>
    <a>Enlace 3</a>
    <a class="enlace">Enlace 4</a>
    <a>Enlace 5</a>
    <script>
        let enlaces=document.getElementsByTagName("a");

        for(let enlace of enlaces){
            if(enlace.classList.contains("enlace")){
                enlace.classList="nuevoEnlace";
            }else{
                enlace.classList="enlace";
            }
            console.log(enlace);
        }
    </script>
</body>
</html>
