<html>
<head>
    <title>Ejercicio 9</title>
</head>
<body>
    <div id="capa">
        <h1>Coordenadas del Navegador</h1>
        <p id="navX"></p>
        <p id="navY"></p>
        <h1>Coordenadas de la Pantalla</h1>
        <p id="SX"></p>
        <p id="SY"></p>
    </div>
    <script>
        let capa=document.getElementById("capa");
        let navX=document.getElementById("navX");
        let navY=document.getElementById("navY");
        let SX=document.getElementById("SX");
        let SY=document.getElementById("SY");

        document.addEventListener("mousemove",(ev)=>{
            navX.textContent=`Navegador X: ${ev.clientX}`;
            navY.textContent=`Navegador Y: ${ev.clientY}`;
            SX.textContent=`Pantalla X: ${ev.screenX}`;
            SY.textContent=`Pantalla Y: ${ev.screenY}`;

            capa.style.color="White"
            capa.style.backgroundColor="Green"
        });
    </script>
</body>
</html>
