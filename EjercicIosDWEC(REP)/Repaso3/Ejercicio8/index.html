<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Correo</title>
    <style>
        div {
            margin: 10px;
            cursor: pointer;
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <div id="contenido"></div>
    <script>
        let contenido=document.getElementById("contenido");

        document.addEventListener("mousemove",(ev)=>{
            ev.preventDefault();
            contenido.innerHTML=`<strong>Coordenadas del Navegador:</strong> ${ev.clientX} : ${ev.clientY} <br>
                                <strong>Coordenadas de la Pantalla:</strong> ${ev.screenX} : ${ev.screenY}`;
        });
    </script>
</body>
</html>
