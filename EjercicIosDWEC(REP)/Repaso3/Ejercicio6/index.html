<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Correo</title>
    <style>
        a {
            margin: 10px;
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script>
        let ol=document.createElement("ol");
        document.body.appendChild(ol);

        for(let i=0;i<3;i++){
            let li=document.createElement("li");
            li.innerHTML="º elemento";

            ol.appendChild(li);
        }

        let media=Math.floor(ol.childNodes.length/2);

        console.log(ol.childNodes[media].previousSibling);
        console.log(ol.childNodes[media].nextSibling);
    </script>

</body>
</html>
