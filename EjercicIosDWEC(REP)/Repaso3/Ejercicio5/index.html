<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Correo</title>
    <style>
        a {
            margin: 10px;
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script>
        function sinAsync() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    let exito = Math.random() > 0.5; // Simula resultado aleatorio
                    if (exito) {
                        resolve("Datos obtenidos con Promesas");
                    } else {
                        reject("Fallo en la promesa");
                    }
                }, 2000);
            });
        }


        function getData(){
            let promesa=sinAsync();
            promesa
            .then(respuesta=>{
                console.log(respuesta);
            })
            .catch(error=>{
                console.error(error);
            });
        }
        getData();
    </script>

</body>
</html>
