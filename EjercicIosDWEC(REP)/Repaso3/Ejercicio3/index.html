<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validación de Correo</title>
  <style>
    a {
      margin: 10px;
      cursor: pointer;
      color: blue;
      text-decoration: underline;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }
  </style>
</head>
<body>

  <form id="formulario">
    <label for="email">Correo Electrónico:</label>
    <input type="email" id="email"><br>

    <label for="rep">Repetir correo electrónico:</label>
    <input type="email" id="rep"><br>
    
    <button type="submit">Enviar</button>
    <p id="mensaje"></p>
  </form>

  <script>
    const formulario = document.getElementById("formulario");
    const correo = document.getElementById("email");
    const rep = document.getElementById("rep");
    const mensaje = document.getElementById("mensaje");

    rep.addEventListener("paste", (ev) => {
      ev.preventDefault();
      rep.value = "";
      alert("No puedes pegar el correo. Escríbelo manualmente.");
    });

    formulario.addEventListener("submit", (e) => {
      e.preventDefault();
      mensaje.textContent = "";
      mensaje.className = "";

      const correo1 = correo.value.trim();
      const correo2 = rep.value.trim();

      if (correo1 === "" || correo2 === "") {
        mensaje.textContent = "Ambos campos son obligatorios.";
        mensaje.className = "error";
        return;
      }

      if (correo1 !== correo2) {
        mensaje.textContent = "Los correos no coinciden.";
        mensaje.className = "error";
      } else {
        mensaje.textContent = "Correo validado correctamente.";
        mensaje.className = "success";
        // formulario.submit(); // Descomenta si quieres enviarlo realmente
      }
    });
  </script>

</body>
</html>
