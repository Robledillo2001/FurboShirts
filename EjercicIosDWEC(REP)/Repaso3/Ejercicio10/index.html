<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Correo</title>
    <style>
        div {
            margin: 10px;
            cursor: pointer;
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <form id="formulario">
        <label></label>
        <input type="text" id="nota">
        <button type="submit">Enviar</button>
    </form>
    <script>
        let formulario = document.getElementById("formulario");
        let nota = document.getElementById("nota");

        formulario.addEventListener("submit", (ev) => {
            ev.preventDefault();
            try {
                let valorNota = Number(nota.value);

                if (isNaN(valorNota)) {
                    throw new Error("Nota no es un número");
                } else if (valorNota < 0 || valorNota > 10) {
                    throw new Error("No se puede añadir la nota");
                } else if (valorNota === 5) {
                    throw new Error("Por los pelos");
                }

                console.log("Nota válida:", valorNota);
            } catch (error) {
                console.error(error.message);
            }
        });
    </script>

</body>
</html>
