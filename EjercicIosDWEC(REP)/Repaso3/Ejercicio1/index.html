<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objeto Window</title>
</head>
<body>

    <form>
        <h2>Objeto Window</h2>
        <label for="porcentaje">Porcentaje</label>
        <input type="number" id="porcentaje"><br>
        <button type="button" id="crearVentana">Crear Ventana</button>
        <button type="button" id="redimensionarVentana">Redimensionar Ventana</button>
        <button type="button" id="borrarVentana">Borrar Ventana</button>
    </form>
    <script>
        document.addEventListener("DOMContentLoaded",()=>{
            let porcentaje=document.getElementById("porcentaje");

            let crear=document.getElementById("crearVentana");
            let redimensionar=document.getElementById("redimensionarVentana");
            let borrar=document.getElementById("borrarVentana");

            let nuevaVentana=null;
            const ancho=600;
            const alto=400;

            crear.addEventListener("click",()=>{
                 nuevaVentana=window.open("","_blank",`width=${ancho},height=${alto}`);
                nuevaVentana.document.write(`<h1>Ventana creada a ${ancho}px de ancho y ${alto} de alto</h1>`);
            })

            redimensionar.addEventListener("click",(ev)=>{
                ev.preventDefault();
                if(porcentaje.value>0 && !isNaN(porcentaje.value)){
                    let factor = parseFloat(porcentaje.value) / 100;
                    let nuevoAncho = ancho * factor;
                    let nuevoAlto = alto * factor;

                    if(nuevaVentana && !nuevaVentana.closed){
                        nuevaVentana.resizeTo(nuevoAncho,nuevoAlto);
                        nuevaVentana.focus();
                        nuevaVentana.document.body.innerHTML=`<h1>Ventana redimensionada a ${nuevoAncho}px de ancho y ${nuevoAlto} de alto</h1>`;
                    }else{
                        alert("No hay ninguna ventana abierta");
                    }
                }else{
                    alert("No se puede redimensionar a 0 o menos");
                }
            });

            borrar.addEventListener("click",()=>{
                if(nuevaVentana && !nuevaVentana.closed){
                    nuevaVentana.close();
                    alert("Ventana Borrada");
                }else{
                    alert("No hay ninguna ventana abierta");
                }
            })
        });
    </script>

</body>
</html>
