<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Seleccionar Nodo</title>
    <style>
        .enlace{
            color:red;
        }
        .nuevoEnlace{
            color: green;
        }
    </style>
</head>
<body>
   <a href=""class="enlace">Enlace1</a><br>
   <a href="">Enlace2</a><br>
   <a href="">Enlace3</a><br>
   <a href="" class="enlace">Enlace4</a><br>
   <a href="">Enlace5</a><br>
    <script>
        let enlaces=document.getElementsByTagName("a");

        for(let enlace of enlaces){
            if(enlace.className==="enlace"){
                enlace.className='nuevoEnlace'
            }else{
                enlace.className="enlace";
            }
        }
    </script>
</body>
</html>
