<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Redimensionar Ventana</title>
</head>
<body>
    <h1>Recordatorio</h1>
    <p id="mensaje"></p>
    
    <form action="">
        <button id="aceptar">Aceptar Recordatorio</button>
        <button id="cancelar">Cancelar Recordatorio</button>
    </form>

    <script>
        let aceptar=document.getElementById("aceptar");
        let cancelar=document.getElementById("cancelar");

        let intervalo;
        let fechaHoy=new Date();

        aceptar.addEventListener("click",(ev)=>{
            ev.preventDefault();
            intervalo=setInterval(()=>{
                let fecha=new Date();
                let tiempoTotal= Math.floor((fecha - fechaHoy) / 1000);

                document.getElementById("mensaje").textContent = `Llevas ${tiempoTotal} segundos en la página.`;
            },5000);
        });

        cancelar.addEventListener("click",(ev)=>{
            ev.preventDefault();
            clearInterval(intervalo);
            intervalo=null;
            document.getElementById("mensaje").textContent = "Recordatorio detenido.";
        })
    </script>
</body>
</html>
