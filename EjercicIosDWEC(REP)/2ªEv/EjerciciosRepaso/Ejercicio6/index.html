<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Seleccionar Nodo</title>
</head>
<body>
   <ul>

   </ul>

    <script>
        let ul = document.getElementsByTagName("ul")[0];
        let contador=0;

        for(let i=0;i<3;i++){
            let li=document.createElement("li");
            li.textContent=`Elemento ${contador+1}`;
            ul.appendChild(li);
            contador++
        }

        let medio=Math.floor(ul.children.length/2)

        let liMedio=ul.children[medio];

        // Mostrar en consola el hermano anterior y siguiente
        console.log("Hermano anterior:", liMedio.previousElementSibling);
        console.log("Hermano siguiente:", liMedio.nextElementSibling);
    </script>
</body>
</html>
