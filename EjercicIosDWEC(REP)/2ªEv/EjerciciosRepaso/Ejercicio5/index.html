<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Seleccionar Nodo</title>
</head>
<body>
    <p class="pp">
        <span class="it">Uno</span>
        <span class="it">Dos</span>
        <span class="it">Tres</span>
        <span class="it">Cuatro</span>
        <span class="it">Cinco</span>
    </p>

    <script>
        let nodos = document.querySelectorAll("p.pp > span.it"); // Selecciona todos los elementos <span> dentro de <p class="pp">
        if (nodos.length > 3) {
            console.log(nodos[3].textContent); // Muestra "Cuatro"
        } else {
            console.log("No hay suficientes elementos para seleccionar el índice [3]");
        }
    </script>
</body>
</html>
