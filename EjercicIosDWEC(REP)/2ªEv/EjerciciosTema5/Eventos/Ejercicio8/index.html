<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentación</title>
  <style>
    h1 { font: bold 1.5em garamond; text-align: center; } 
    #visor { position: absolute; left: 300px;top: 100px; width: 400px; height: 300px; background-color: aqua; overflow: hidden; }
     #visor img { width: 400px; }
      #fotoActual { position: absolute; top: 0px; left: 0px; } 
      #piefoto { position: absolute; left: 300px; top: 400px; width: 400px; height: 45px; background-color: silver; } 
      #controlesre { position: absolute; top: 20px; left: 5px; } 
      #controlesav { position: absolute; top: 20px; right: 5px; } 
      #mititulo { position: absolute; top: 5px; left: 110px; font: normal 12px arial; }
  </style>
</head>
<body>
  <h1>Presentación de fotos</h1>
  <div id="visor">
    <div id="fotoActual">
      <img src="imagenesEjercicio7/foto1.jpg" alt="1. India - Agra - El Taj Mahal." width="400" name="fotos">
    </div>
  </div>

  <div id="piefoto">
    <div id="controlesre">
      <button id="inicio">Inicio</button>
      <button id="anterior">Anterior</button>
    </div>
    <div id="controlesav">
      <button id="siguiente">Siguiente</button>
      <button id="final">Final</button>
    </div>
    <div id="mititulo">1. India - Agra - El Taj Mahal.</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
