<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Plantilla HTML con JS Externo</title>
    <!-- Puedes agregar más estilos CSS aquí si es necesario -->
     <style>
      h1{ text-align: center; color:white; font-family: sans-serif; background-color: peru; } 
      figure{ position:absolute; top:100px; left:0; width:300px; } figure img{ width:100%;}
       main{ position:absolute; top:100px; left:400px; } #fDescripcion{ display:none; }
     </style>
</head>
<body>
    <header>
        <h1>INFORME INCIDENCIA</h1>
      </header>
      
      <figure>
        <img src="imagenesEjercicio6/distribucion.jpg" alt="oficina" id="imagen"/>
      </figure>
      
      <main>
        <form id="formulario" action="#" onsubmit="return validarFormulario()">
          <table>
            <tr>
              <td>
                <label for="tipo">Tipo de incidencia</label>
              </td>
              <td>
                <select name="tipo" id="tipo">
                  <option value="distribucion" selected>Distribución</option>
                  <option value="oficina">Oficina</option>
                  <option value="produccion">Producción</option>
                </select>
              </td>
            </tr>
      
            <tr>
              <td>
                <label for="serie">Número de serie</label>
              </td>
              <td>
                <input type="text" name="serie" id="serie" required>
              </td>
            </tr>
      
            <tr>
              <td colspan="2">
                <button type="button" id="mostrarDescripcion">Mostrar Descripción</button>
                <div id="fDescripcion" style="display: none;">
                  <label for="descripcion" id="labelDescripcion">Descripción</label><br>
                  <textarea name="descripcion" id="descripcion" cols="30" rows="10"></textarea>
                </div>
              </td>
            </tr>
      
            <tr>
              <td colspan="2">
                <br>
                <input type="submit" id="enviar" value="Enviar datos">
              </td>
            </tr>
          </table>
      
          <div id="capaError"></div>
        </form>
      </main>
      
      <script type="text/javascript" src="script.js"></script>      
</body>
</html>
