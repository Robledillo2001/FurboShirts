<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio1</title>
    <style>
        #capaSaludo {
            display: none;
        }
    </style>
</head>
<body>
    <div id="capaFormulario">
        <form>
            <h1>Introduce el nombre de usuario</h1>
            <input type="text" id="cTextoUsuario" placeholder="Usuario">
            <button type="button" id="crear">Crear</button>
        </form>
    </div>
    <div id="capaSaludo">
        <p id="parrafoSaludo">Bienvenido</p>
        <button type="button" id="botonSaludo">Borrar Usuario</button>
    </div>
    <script>
        let form = document.getElementById("capaFormulario");
        let saludo = document.getElementById("capaSaludo");
        let usuario = document.getElementById("cTextoUsuario");
        let contador = 1;

        document.getElementById("crear").addEventListener("click", () => {
            let fechaCAD = new Date();
            fechaCAD.setTime(fechaCAD.getTime() + 1000 * 60 * 60 * 24 * 7); // 1 semana
            
            document.cookie = `nombre=${usuario.value};expires=${fechaCAD.toUTCString()};path=/`;
            document.cookie = `contador=${contador};expires=${fechaCAD.toUTCString()};path=/`;

            saludo.style.display = "block";
            form.style.display = "none";
            actualizarSaludo();
        });

        document.getElementById("botonSaludo").addEventListener("click", () => {
            document.cookie = "nombre=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
            document.cookie = "contador=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
            saludo.style.display = "none";
            form.style.display = "block";
        });

        function actualizarSaludo() {
            let arrayCookie = document.cookie.split(";");
            let nombre = "";
            let contadorValor = "";

            for (let cookie of arrayCookie) {
                let [clave, valor] = cookie.split("=");
                if (clave.trim() === "nombre") {
                    nombre = valor;
                } else if (clave.trim() === "contador") {
                    contadorValor = valor;
                }
            }

            document.getElementById("parrafoSaludo").textContent = `Bienvenido ${nombre} (Visitas: ${contadorValor})`;
        }

        window.onload = () => {
            contador ++;
            let arrayCookie = document.cookie.split(";");
            let nombre = "";
            let contadorValor = "";

            for (let cookie of arrayCookie) {
                let [clave, valor] = cookie.split("=");
                if (clave.trim() === "nombre") {
                    nombre = valor;
                } else if (clave.trim() === "contador") {
                    contadorValor = valor;
                }
            }

            if (nombre) {
                document.getElementById("parrafoSaludo").textContent = `Bienvenido ${nombre} (Visitas: ${contadorValor})`;
                saludo.style.display = "block";
                form.style.display = "none";
            }
        };
    </script>
</body>
</html>
