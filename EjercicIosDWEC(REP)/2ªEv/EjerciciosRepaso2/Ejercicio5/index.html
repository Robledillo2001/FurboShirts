<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Campos Obligatorios</title>
</head>
<body>
    <script>
        function conPromesas() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                resolve("Datos obtenidos con Promesas");
                }, 2000);
            });
        }

        function getData() {
        conPromesas()
            .then(data => {
            console.log(data);
            })
            .catch(error => {
            console.error("Error:", error);
            });
        }
        getData();
    </script>
</body>
</html>
