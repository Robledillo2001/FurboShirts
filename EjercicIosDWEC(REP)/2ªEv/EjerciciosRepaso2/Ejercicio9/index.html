<!DOCTYPE html>
<html>
<head>
    <style>

    </style>
</head>
<body>
    <form action="">
        <label for="numero">Numero</label>
        <input type="text" id="numero">
        <button type="submit">Enviar</button>
    </form>
    <script>
        let form = document.querySelector("form"); // Mejor usar querySelector directamente
        let numeroInput = document.getElementById("numero"); // Renombrar para claridad

        form.addEventListener("submit", (ev) => {
            ev.preventDefault(); // Corregir typo: preventDefautl → preventDefault
            
            try {
                // Validaciones
                const valor = parseInt(numeroInput.value);
                
                if (isNaN(valor)) throw new Error("No es un número");
                if (valor <= 0) throw new Error("Número menor o igual a 0");
                if (valor >= 100) throw new Error("Número mayor o igual a 100");
                
                alert("Número válido: " + valor);
                
            } catch (error) {
                // Gestión centralizada de errores
                console.error(`Error: ${error.message}`);
                numeroInput.focus();
                numeroInput.classList.add('error');
            }
        });
    </script>
</body>
</html>
