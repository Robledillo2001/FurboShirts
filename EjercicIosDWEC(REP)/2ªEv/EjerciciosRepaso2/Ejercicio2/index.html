<html>
    <head>
        <title>Enlaces como botones</title>
    </head>
    <form method="post" id="form">
        <label for="correo">Correo</label>
        <input type="email" name="" id="correo">
        <a href="" data-action="submit" id="enviar">Enviar</a>
        <a href=""data-action="reset"  id="borrar">Borrar</a>
    </form>

    <script>
        let enlaces=document.querySelectorAll("a[data-action]");

        enlaces.forEach(enlace => {
            enlace.addEventListener("click",(ev)=>{
                ev.preventDefault();
                let correo=document.getElementById("correo").value;

                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if(regex.test(correo)){
                    if(enlace.dataset.action==="submit"){
                        alert("Correo enviado");
                    }else{
                        alert("Datos eliminados");
                    }
                }
            });
        });
    </script>
</html>
