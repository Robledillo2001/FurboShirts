<!DOCTYPE html>
<html>
<head>
    <style>
        #coordenadas {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }
        
        .coordenada-item {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        
        .etiqueta {
            color: #00ff9d;
        }
    </style>
</head>
<body>
    <div id="coordenadas">
        <div class="coordenada-item">
            <span class="etiqueta">Ventana:</span>
            <span id="ventana-pos">-</span>
        </div>
        <div class="coordenada-item">
            <span class="etiqueta">Página:</span>
            <span id="pagina-pos">-</span>
        </div>
        <div class="coordenada-item">
            <span class="etiqueta">Pantalla:</span>
            <span id="pantalla-pos">-</span>
        </div>
    </div>

    <script>
        const ventanaPos = document.getElementById('ventana-pos');
        const paginaPos = document.getElementById('pagina-pos');
        const pantallaPos = document.getElementById('pantalla-pos');

        document.addEventListener('click', (evento) => {
            // Actualizar coordenadas relativas a la ventana
            ventanaPos.textContent = `${evento.clientX}px, ${evento.clientY}px`;
            
            // Actualizar coordenadas relativas a todo el documento
            paginaPos.textContent = `${evento.pageX}px, ${evento.pageY}px`;
            
            // Actualizar coordenadas absolutas de la pantalla
            pantallaPos.textContent = `${evento.screenX}px, ${evento.screenY}px`;
        });
    </script>
</body>
</html>
