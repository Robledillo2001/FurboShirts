<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Campos Obligatorios</title>
</head>
<body>
    <script>
       let ul = document.createElement("ul");
        let contador=0;

        for(let i=0;i<3;i++){
            let li=document.createElement("li");
            li.textContent=`Elemento ${contador+1}`;
            ul.appendChild(li);
            contador++
        }
        document.body.appendChild(ul);

        let medio=Math.floor(ul.children.length/2)

        let liMedio=ul.children[medio];

        // Mostrar en consola el hermano anterior y siguiente
        console.log("Hermano anterior:", liMedio.previousElementSibling);
        console.log("Hermano siguiente:", liMedio.nextElementSibling);
    </script>
</body>
</html>
