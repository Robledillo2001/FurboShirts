<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio6</title>
</head>
<body>
  <input type="text" id="tarea" placeholder="Nueva tarea"/>
  <button id="agregar">Agregar tarea</button>
  <ul id="todo_list"></ul>

  <script>
    const tareas = [
      { title: 'Hacer la colada' },
      { title: 'Preparar la cena' },
      { title: 'Tirar la basura' }
    ];

    const lista = document.querySelector('#todo_list');

    // Función para añadir una tarea a la lista
    function añadirTareas(text) {
      const li = document.createElement('li');
      li.textContent = text;
      lista.appendChild(li);
    }

    // Añadimos las tareas iniciales
    tareas.forEach(task => añadirTareas(task.title));

    // Añadimos la tarea que se introduce en el input al pulsar el botón
    const agregarBoton = document.getElementById("agregar");
    agregarBoton.addEventListener("click", ()=> {
      const tarea = document.getElementById("tarea").value;
      añadirTareas(tarea);
      // Limpiamos el cuadro de texto tras añadir la tarea
      document.getElementById("tarea").value = "";
    });
  </script>
</body>
</html>
