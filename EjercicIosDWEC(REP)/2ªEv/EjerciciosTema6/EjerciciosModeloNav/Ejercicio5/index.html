<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento Window</title>
</head>
<body>
    <h1>Ventana lado</h1>
    <form id="form">
        <label>
            <input type="radio" name="option" value="same" checked> Misma ventana
        </label>
        <label>
            <input type="radio" name="option" value="new"> Nueva ventana
        </label>
        <br><br>
        <button id="abrirWeb">Abrir www.cuenca.es</button>
    </form>

    <script>
        document.getElementById("abrirWeb").addEventListener("click",()=>{
            event.preventDefault();

            const seleccion=document.querySelector('input[name="option"]:checked').value;
            const link="https://www.cuenca.es";

            if(seleccion==="same"){
                window.location.href=link;
            }else{
                window.open(link,"_blank");
            }
        });
    </script>
</body>
</html>
