<!DOCTYPE html> 
<html> 
    <head> 
        <title>Ejemplo DOM - aprenderaprogramar</title> 
        <meta charset="utf-8"> 
    </head> 
    <body> 
        <p>Uno</p> 
        <p>Dos</p> 
        <p>Tres</p> 
        <p>Cuatro</p>
        <script> 
            let nuevoParrafo=document.createElement("p"); 
            nuevoParrafo.textContent="Cinco"; 
            document.body.appendChild(nuevoParrafo); 

            let parrafos=document.querySelectorAll("p"); 

            for (let elemento of parrafos) { 
                elemento.addEventListener("click",(ev)=>{alert(ev.target.textContent)}); 
            } 
            //No funciona en el quinto parrafo porque se llama al evento click antes de que se cree el parrafo
            //Tendriamos que crear un nuevo parrafo antes de llamar al evento para que salga el alert en todos
        </script> 
    </body> 
</html>
