<!DOCTYPE html>
<html>
<head>
  <title>Ejemplo DOM - aprenderaprogramar</title>
  <meta charset="utf-8">
</head>
<body>
  <section id="s1">
    <h1 id="titulo">¿Quién soy?</h1>
    <p>Uno</p>
    <p>Dos</p>
    <p>Tres</p>
    <p>Cuatro</p>
    <p>Cinco</p>
  </section>

  <script>
    // Seleccionamos la sección que contiene los párrafos
    const section = document.getElementById("s1");

    // Delegación de eventos: escucha los clics en la sección
    section.addEventListener("click", function(event) {
      // Verifica si el elemento clicado es un <p>
      if (event.target.tagName.toLowerCase() === "p") {
        let parrafo = event.target; // Captura el párrafo clicado

        // Mueve el párrafo al principio de la sección, después del <h1>
        section.insertBefore(parrafo, section.children[1]); 
      }
    });
  </script>
</body>
</html>
