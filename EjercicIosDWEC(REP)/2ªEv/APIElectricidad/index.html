<body>
    <script>
        function crearCookie(nombre) {
            let fecha = new Date();
            // Establecemos la fecha de expiración para el 24 de febrero de 2025
            fecha.setFullYear(2025, 1, 24);  // Mes 1 es febrero (ya que los meses comienzan desde 0)
            let fechaExpiracion = fecha.toUTCString();  // Convertir la fecha a un formato compatible con cookies

            // Crear la cookie con nombre y fecha de expiración
            document.cookie = `nombre=${nombre};expires=${fechaExpiracion};path=/`;
        }

        function eliminarCookie(){
            document.cookie=`nombre=;expires=Sat, 01 Jan 2000 00:00:01 GMT`;
        }

        crearCookie("Ruben");

        let arrayCookies=document.cookie.split(";");

        for(let cookie of arrayCookies){
            let[clave,valor]=cookie.split("=");
            console.log(valor);
        }
    </script>
</body>
