<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Calculadora Formulario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<style>
  form{
    text-align: justify;
    font-size: 23px;
  }
  b{
    color:blue;
  }
</style>
<body>
  <!-- Formulario para la calculadora -->
  <form method="post" action="procesar_operaciones.php">
    <label for="num1">Numero1</label>
    <input type="number" name="num1" placeholder="Número 1" required><br>
    <label for="num2">Numero2</label>
    <input type="number" name="num2" placeholder="Número 2" required><br>
    <label for="operador">Operador</label>
    <select name="operador" required>
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
    </select><br>
    <button type="submit">Calcular</button>
  </form>
</body>
</html>
